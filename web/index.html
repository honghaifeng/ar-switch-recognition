<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AR开关识别</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: #000; color: #e0e6f0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }

/* 全屏摄像头 */
.camera-layer {
  position: fixed; inset: 0; z-index: 1; background: #0a0e1a;
  display: flex; align-items: center; justify-content: center;
}
#video { width: 100%; height: 100%; object-fit: cover; }
#canvas { display: none; }
#uploadPreview {
  display: none; position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: contain; background: #000;
}

/* 顶部状态 */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: env(safe-area-inset-top, 12px) 16px 10px;
  background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  display: flex; justify-content: space-between; align-items: center;
}
.status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8892a4; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 1.5s infinite; }
.dot.error { background: #ff4444; animation: none; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.auto-badge {
  padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  background: rgba(0,255,136,0.15); color: #00ff88;
}
.auto-badge.off { background: rgba(255,255,255,0.1); color: #6b7280; }

/* 扫描框 */
.scan-overlay {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.scan-frame {
  width: 72%; aspect-ratio: 4/3; border: 1.5px solid rgba(0,212,255,0.5);
  border-radius: 12px; position: relative;
}
.scan-corners { position: absolute; inset: -2px; }
.scan-corners::before, .scan-corners::after,
.scan-frame::before, .scan-frame::after {
  content: ''; position: absolute; width: 24px; height: 24px; border: 3px solid #00d4ff;
}
.scan-corners::before { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
.scan-corners::after { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
.scan-frame::before { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
.scan-frame::after { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 8px 0; }
.scan-line {
  position: absolute; left: 8%; width: 84%; height: 2px;
  background: linear-gradient(90deg, transparent, #00d4ff, transparent);
  box-shadow: 0 0 12px #00d4ff;
  animation: scanY 2.5s ease-in-out infinite;
}
@keyframes scanY { 0%,100% { top: 8%; } 50% { top: 88%; } }
.scan-hint {
  position: absolute; bottom: -32px; width: 100%; text-align: center;
  font-size: 13px; color: rgba(0,212,255,0.7);
}

/* 底部按钮区 */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 12px 16px calc(env(safe-area-inset-bottom, 12px) + 12px);
  background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  display: flex; justify-content: center; align-items: center; gap: 12px;
}
.btn {
  border: none; border-radius: 10px; cursor: pointer;
  font-size: 14px; font-weight: 600; transition: all 0.15s;
  padding: 12px 20px; white-space: nowrap;
}
.btn-capture {
  width: 64px; height: 64px; border-radius: 50%; padding: 0;
  background: linear-gradient(135deg, #00d4ff, #0088ff);
  color: #fff; font-size: 12px;
  box-shadow: 0 4px 20px rgba(0,136,255,0.5);
  display: flex; align-items: center; justify-content: center;
}
.btn-capture:active { transform: scale(0.9); }
.btn-capture.loading { opacity: 0.6; }
.btn-side {
  background: rgba(255,255,255,0.12); color: #c0c8d8;
  border: 1px solid rgba(255,255,255,0.1); font-size: 13px; padding: 10px 16px;
  border-radius: 24px;
}
.btn-side:active { background: rgba(255,255,255,0.2); }

/* 结果面板 — 底部抽屉 */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.result-sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
  max-height: 80vh; background: #0f1320;
  border-radius: 20px 20px 0 0;
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.result-sheet.open { transform: translateY(0); }

.sheet-handle {
  padding: 12px; display: flex; justify-content: center; flex-shrink: 0;
}
.sheet-handle::before {
  content: ''; width: 36px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.2);
}
.sheet-close {
  position: absolute; top: 10px; right: 16px; width: 32px; height: 32px;
  border-radius: 50%; border: none; background: rgba(255,255,255,0.1);
  color: #8892a4; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.sheet-body { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

/* 结果内容 */
.equip-header {
  padding: 4px 20px 16px;
  background: linear-gradient(135deg, rgba(0,255,136,0.06), rgba(0,212,255,0.04));
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.equip-badge {
  display: inline-block; padding: 3px 10px; border-radius: 4px;
  background: rgba(0,212,255,0.15); color: #00d4ff; font-size: 11px; margin-bottom: 6px;
}
.equip-name { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.equip-model { font-size: 12px; color: #8892a4; }

.info-section { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.info-title {
  font-size: 13px; font-weight: 600; color: #00d4ff; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.info-title::before { content: ''; width: 3px; height: 14px; background: #00d4ff; border-radius: 2px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-item { background: rgba(255,255,255,0.04); padding: 8px 10px; border-radius: 6px; }
.info-label { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
.info-value { font-size: 13px; color: #e0e6f0; }

.tab-bar { display: flex; position: sticky; top: 0; background: #0f1320; z-index: 1; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; cursor: pointer;
  font-size: 12px; color: #6b7280; border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: #00d4ff; border-bottom-color: #00d4ff; background: rgba(0,212,255,0.05); }
.tab-content { display: none; padding: 12px 20px; }
.tab-content.active { display: block; }

.step-list { list-style: none; counter-reset: step; }
.step-list li {
  counter-increment: step; position: relative;
  padding: 7px 0 7px 30px; font-size: 13px; line-height: 1.5; color: #c0c8d8;
}
.step-list li::before {
  content: counter(step); position: absolute; left: 0; top: 7px;
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(0,212,255,0.15); color: #00d4ff;
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}
.safety-list { list-style: none; }
.safety-list li {
  padding: 6px 0 6px 20px; font-size: 13px; color: #fbbf24;
  position: relative; line-height: 1.5;
}
.safety-list li::before { content: '\26A0'; position: absolute; left: 0; top: 6px; font-size: 12px; }

.ocr-texts { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.ocr-tag {
  padding: 2px 8px; background: rgba(255,255,255,0.06); border-radius: 4px;
  font-size: 11px; color: #8892a4;
}

/* 识别成功提示 toast */
.toast {
  position: fixed; top: 50%; left: 50%; z-index: 40;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.85); color: #00ff88;
  padding: 16px 28px; border-radius: 12px; font-size: 15px; font-weight: 600;
  opacity: 0; transition: all 0.3s; pointer-events: none;
  border: 1px solid rgba(0,255,136,0.3);
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
</style>
</head>
<body>

<!-- 摄像头层 -->
<div class="camera-layer">
  <video id="video" autoplay playsinline muted></video>
  <img id="uploadPreview">
  <canvas id="canvas"></canvas>
</div>

<!-- 扫描框 -->
<div class="scan-overlay" id="scanOverlay">
  <div class="scan-frame">
    <div class="scan-corners"></div>
    <div class="scan-line"></div>
    <div class="scan-hint">将开关铭牌置于框内</div>
  </div>
</div>

<!-- 顶部 -->
<div class="top-bar">
  <div class="status">
    <span class="dot" id="camDot"></span>
    <span id="camStatus">启动中...</span>
  </div>
  <div class="auto-badge" id="autoBadge" onclick="toggleAuto()">自动识别</div>
</div>

<!-- 底部按钮 -->
<div class="bottom-bar">
  <label class="btn btn-side" style="position:relative;">
    相册
    <input type="file" accept="image/*" onchange="uploadImage(event)" style="position:absolute;inset:0;opacity:0;">
  </label>
  <button class="btn btn-capture" id="captureBtn" onclick="captureAndRecognize()">识别</button>
  <button class="btn btn-side" id="autoBtn" onclick="toggleAuto()">暂停</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 结果抽屉 -->
<div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="result-sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()">&times;</button>
  <div class="sheet-body">
    <div class="equip-header">
      <span class="equip-badge" id="eqCategory"></span>
      <div class="equip-name" id="eqName"></div>
      <div class="equip-model" id="eqModel"></div>
    </div>
    <div class="info-section">
      <div class="info-title">基本参数</div>
      <div class="info-grid" id="eqParams"></div>
    </div>
    <div class="info-section">
      <div class="info-title">OCR识别文字</div>
      <div class="ocr-texts" id="ocrTexts"></div>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('inspection')">巡检</div>
      <div class="tab" onclick="switchTab('close')">合闸</div>
      <div class="tab" onclick="switchTab('open')">分闸</div>
      <div class="tab" onclick="switchTab('safety')">安全</div>
    </div>
    <div class="tab-content active" id="tab-inspection"></div>
    <div class="tab-content" id="tab-close"></div>
    <div class="tab-content" id="tab-open"></div>
    <div class="tab-content" id="tab-safety"></div>
  </div>
</div>

<script>
const API = '';
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let autoMode = true, autoTimer = null, recognizing = false;

// ── 摄像头 ──
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    document.getElementById('camDot').classList.remove('error');
    document.getElementById('camStatus').textContent = '已就绪';
    startAutoRecognize();
  } catch (e) {
    document.getElementById('camDot').classList.add('error');
    document.getElementById('camStatus').textContent = e.message;
  }
}

// ── 截图 ──
function captureFrame() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.7);
}

// ── 识别 ──
async function captureAndRecognize() {
  if (recognizing) return;
  recognizing = true;
  const btn = document.getElementById('captureBtn');
  btn.classList.add('loading'); btn.textContent = '...';
  try {
    const imageData = captureFrame();
    const resp = await fetch(API + '/api/recognize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData }),
    });
    const data = await resp.json();
    if (data.success && data.equipment) showResult(data);
  } catch (e) { console.error(e); }
  finally { recognizing = false; btn.classList.remove('loading'); btn.textContent = '识别'; }
}

// ── 显示结果 ──
let lastModelKey = '';
function showResult(data) {
  if (data.model_key === lastModelKey) return;
  lastModelKey = data.model_key;
  const eq = data.equipment;

  showToast(eq.full_name);

  document.getElementById('eqCategory').textContent = eq.category;
  document.getElementById('eqName').textContent = eq.full_name;
  document.getElementById('eqModel').textContent = eq.description;

  const params = [
    ['额定电压', eq.voltage], ['额定电流', eq.rated_current],
    ['开断电流', eq.breaking_current], ['操作机构', eq.mechanism],
  ];
  document.getElementById('eqParams').innerHTML = params.map(([l,v]) =>
    `<div class="info-item"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`
  ).join('');

  document.getElementById('ocrTexts').innerHTML = data.ocr_texts.map(t =>
    `<span class="ocr-tag">${t}</span>`
  ).join('');

  document.getElementById('tab-inspection').innerHTML =
    `<ol class="step-list">${eq.inspection.map(s=>`<li>${s}</li>`).join('')}</ol>`;
  document.getElementById('tab-close').innerHTML =
    `<ol class="step-list">${(eq.operation?.close||[]).map(s=>`<li>${s}</li>`).join('')}</ol>`;
  document.getElementById('tab-open').innerHTML =
    `<ol class="step-list">${(eq.operation?.open||[]).map(s=>`<li>${s}</li>`).join('')}</ol>`;
  document.getElementById('tab-safety').innerHTML =
    `<ul class="safety-list">${eq.safety.map(s=>`<li>${s}</li>`).join('')}</ul>`;

  switchTab('inspection');
  openSheet();
}

// ── Toast ──
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ── 抽屉 ──
function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}

// ── 抽屉手势下滑关闭 ──
let touchStartY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('sheet').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 80) closeSheet();
}, { passive: true });

// ── Tab ──
function switchTab(name) {
  const names = ['inspection','close','open','safety'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── 自动识别 ──
function startAutoRecognize() {
  if (autoTimer) clearInterval(autoTimer);
  if (autoMode) autoTimer = setInterval(() => { if(!recognizing) captureAndRecognize(); }, 2500);
}
function toggleAuto() {
  autoMode = !autoMode;
  const badge = document.getElementById('autoBadge');
  const btn = document.getElementById('autoBtn');
  if (autoMode) {
    badge.textContent = '自动识别'; badge.classList.remove('off');
    btn.textContent = '暂停';
    startAutoRecognize();
  } else {
    badge.textContent = '已暂停'; badge.classList.add('off');
    btn.textContent = '自动';
    if (autoTimer) clearInterval(autoTimer);
  }
}

// ── 上传图片 ──
function uploadImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const preview = document.getElementById('uploadPreview');
    preview.src = e.target.result; preview.style.display = 'block';
    video.style.display = 'none';
    document.getElementById('scanOverlay').style.display = 'none';

    recognizing = true;
    const btn = document.getElementById('captureBtn');
    btn.classList.add('loading'); btn.textContent = '...';
    try {
      const resp = await fetch(API + '/api/recognize', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ image: e.target.result }),
      });
      const data = await resp.json();
      if (data.success && data.equipment) { lastModelKey=''; showResult(data); }
      else { showToast('未识别到型号'); }
    } catch(err) { showToast('请求失败'); }
    finally { recognizing=false; btn.classList.remove('loading'); btn.textContent='识别'; }
    // 3秒后恢复摄像头
    setTimeout(() => {
      preview.style.display = 'none'; video.style.display = '';
      document.getElementById('scanOverlay').style.display = '';
    }, 3000);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

startCamera();
</script>
</body>
</html>
